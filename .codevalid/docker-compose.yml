services:
  app:
    build:
      context: ..
      dockerfile: .codevalid/Dockerfile
    environment:
      SERVER_PORT: "6713"
      PORT: "6713"
      JWT_SECRET: "codevalid-test-jwt-secret-32chars!!"
      SIG_KEY: "codevalid-test-sig-key-32chars-xx"
      SIG_SALT: "codevalid-test-sig-salt"
      NODE_ENV: "production"
      STORAGE_DIR: "/app/server/storage"
      WAIT_FOR_TCP: ""
      MIGRATE_CMD: "npx --prefix /app/server prisma migrate deploy --schema /app/server/prisma/schema.prisma"
    ports:
      - "6713:6713"
    depends_on:
      toxiproxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:6713/health"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [codevalid]

  toxiproxy:
    build:
      context: ./toxiproxy
      dockerfile: Dockerfile
    command: ["-host=0.0.0.0", "-config=/config/toxiproxy.json"]
    ports:
      - "8474:8474"
    healthcheck:
      test: ["CMD", "/bin/busybox", "wget", "-q", "-O", "/dev/null", "http://localhost:8474/version"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks: [codevalid]

  seed-test:
    profiles: ["test"]
    build:
      context: .
      dockerfile: seed-test.Dockerfile
    depends_on:
      app:
        condition: service_healthy
    entrypoint: ["/bin/sh", "seed_test_cases/health_check.sh"]
    networks: [codevalid]

networks:
  codevalid:
